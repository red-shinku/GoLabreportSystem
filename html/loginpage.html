<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验报告管理系统 - 登录</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        .htmx-request button {
            background: #ccc;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>实验报告管理系统</h1>
        <form hx-post="/api/v1/sessions"
              hx-headers='{"Content-Type": "application/json"}'
              hx-ext="json-enc"
              hx-target="#error-msg"
              hx-swap="innerHTML">
            <div class="form-group">
                <label for="userNumber">学号/工号</label>
                <input type="text"
                       id="userNumber"
                       name="userNumber"
                       required
                       autocomplete="username"
                       placeholder="请输入学号或工号">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password"
                       id="password"
                       name="password"
                       required
                       autocomplete="current-password"
                       placeholder="请输入密码">
            </div>
            <button type="submit">登录</button>
            <div id="error-msg" class="error"></div>
        </form>
    </div>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
</body>
</html>
