{{define "project-stu"}}
<div class="project">
    <div class="project-header">
        <span class="project-name">{{.ProjectName}}</span>
        {{if not .IsActive}}
        <span class="status-badge status-closed">已关闭</span>
        {{else if .IsSubmit}}
        <span class="status-badge status-submitted">已提交</span>
        {{else}}
        <span class="status-badge status-pending">待提交</span>
        {{end}}
    </div>
    <div class="project-info">
        开始时间：{{.StartTime.Format "2006-01-02 15:04"}} |
        截止时间：{{.CloseTime.Format "2006-01-02 15:04"}}
    </div>
    <div class="project-actions">
        <button type="button"
                class="btn btn-secondary"
                onclick="downloadFile('{{.DownloadReq.URL}}')">
            下载项目要求
        </button>
        {{if .IsActive}}
        <button type="button"
                class="btn btn-primary"
                onclick="toggleUploadForm(this)">
            {{if .IsSubmit}}重新提交报告{{else}}提交报告{{end}}
        </button>
        {{end}}
        {{if .IsSubmit}}
        <button type="button"
                class="btn btn-success"
                onclick="previewFile('{{.Check.URL}}')">
            预览我的报告
        </button>
        {{end}}
    </div>
    {{if .IsActive}}
    <form class="upload-form"
          hx-post="{{.Submit.URL}}"
          hx-encoding="multipart/form-data"
          hx-target="closest .project"
          hx-swap="outerHTML">
        <div class="file-input-wrapper">
            <input type="file" name="filename" required accept=".pdf,.doc,.docx,.zip">
        </div>
        <button type="submit" class="btn btn-success">确认上传</button>
        <button type="button" class="btn btn-secondary" onclick="toggleUploadForm(this.parentElement)">取消</button>
    </form>
    {{end}}
</div>
{{end}}
