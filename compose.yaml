services:
  labsys:
    image: labsys:v0.1
    container_name: toriLabsys
    restart: always
    ports: 
      - "127.0.0.1:80:8080"
    environment:
      - ENABLE_TLS=false
      - DATABASE_ADDR=toriMysql
      - DATABASE_PORT=3306
      - DATABASE_USER=root
    volumes:
      - ./db.pass:/app/db.pass:ro
      - ./jwt.key:/app/jwt.key:ro
      - ./config.json:/app/config.json
    networks:
      - labsys-net
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0.45-debian
    container_name: toriMysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - TZ=Asia/Shanghai
    volumes:
      - ./storage:/var/lib/mysql
    networks:
      - labsys-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s 
      timeout: 3s
      retries: 10
      start_period: 25s

networks:
  labsys-net:
    driver: bridge
